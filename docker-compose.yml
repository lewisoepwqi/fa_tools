services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fa_tools
      POSTGRES_USER: fa_tools
      POSTGRES_PASSWORD: fa_tools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fa_tools -d fa_tools"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
