name: CI
on: [push, pull_request]
jobs:
  backend-sqlite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m venv .venv && .venv/bin/pip install -e . && .venv/bin/pip install pytest pytest-cov httpx ruff
      - run: .venv/bin/python -m ruff check .
      - run: .venv/bin/pytest -q

  backend-pg:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fa_tools
          POSTGRES_USER: fa_tools
          POSTGRES_PASSWORD: fa_tools
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U fa_tools"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://fa_tools:fa_tools@localhost:5432/fa_tools
      TEST_DATABASE_URL: postgresql+psycopg://fa_tools:fa_tools@localhost:5432/fa_tools
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m venv .venv && .venv/bin/pip install -e . && .venv/bin/pip install pytest httpx "psycopg[binary]"
      - run: .venv/bin/alembic upgrade head
      - run: .venv/bin/pytest -q
